# =============================================================================
# ReadyPI — Cloud Build CI/CD Pipeline
# =============================================================================
# Triggers on push to 'main' branch. Builds the Docker image for the Express
# API, pushes to Artifact Registry, and deploys to Cloud Run.
#
# Setup trigger:
#   gcloud builds triggers create github \
#     --repo-name=ReadyPI \
#     --repo-owner=YOUR_GITHUB_USER \
#     --branch-pattern="^main$" \
#     --build-config=cloudbuild.yaml \
#     --project=readypi-prod
# =============================================================================

substitutions:
  _REGION: asia-southeast1
  _SERVICE_NAME: readypi-api
  _DASHBOARD_SERVICE_NAME: readypi-dashboard
  _DASHBOARD_API_URL: https://readypi-api-jhuoxne7ta-as.a.run.app
  _SQL_INSTANCE: readypi-prod:asia-southeast1:readypi-db
  _SERVICE_ACCOUNT: readypi-api-runner@readypi-prod.iam.gserviceaccount.com
  _REPO_NAME: readypi-docker

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # -------------------------------------------------------------------------
  # Step 1: Build the API Docker image
  # -------------------------------------------------------------------------
  - id: 'build-api-image'
    name: 'gcr.io/cloud-builders/docker'
    dir: 'api'
    args:
      - 'build'
      - '--tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:latest'
      - '--cache-from=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:latest'
      - '--build-arg=BUILDKIT_INLINE_CACHE=1'
      - '.'

  # -------------------------------------------------------------------------
  # Step 2: Push the image to Artifact Registry
  # -------------------------------------------------------------------------
  - id: 'push-api-image'
    name: 'gcr.io/cloud-builders/docker'
    waitFor: ['build-api-image']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}'

  # -------------------------------------------------------------------------
  # Step 3: Deploy to Cloud Run
  # -------------------------------------------------------------------------
  - id: 'deploy-to-cloud-run'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    waitFor: ['push-api-image']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=${_REGION}'
      - '--service-account=${_SERVICE_ACCOUNT}'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances=${_SQL_INSTANCE}'
      - '--set-secrets=DB_PASSWORD=DB_PASSWORD:latest,JWT_SECRET=JWT_SECRET:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,GOOGLE_API_KEY=GOOGLE_API_KEY:latest,GROQ_API_KEY=GROQ_API_KEY:latest,DEEPSEEK_API_KEY=DEEPSEEK_API_KEY:latest,MISTRAL_API_KEY=MISTRAL_API_KEY:latest,OPENROUTER_API_KEY=OPENROUTER_API_KEY:latest,SSLCOMMERZ_STORE_ID=SSLCOMMERZ_STORE_ID:latest,SSLCOMMERZ_STORE_PASSWORD=SSLCOMMERZ_STORE_PASSWORD:latest,NOWPAYMENTS_API_KEY=NOWPAYMENTS_API_KEY:latest'
      - '--set-env-vars=NODE_ENV=production,PORT=8080,DB_HOST=/cloudsql/${_SQL_INSTANCE},DB_NAME=readypi,DB_USER=readypi_app,DB_SSL=false,CORS_ORIGIN=https://readypi.io,https://dashboard.readypi.io'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=60s'
      - '--project=$PROJECT_ID'

  # -------------------------------------------------------------------------
  # Step 4: Verify deployment health
  # -------------------------------------------------------------------------
  - id: 'verify-deployment'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    waitFor: ['deploy-to-cloud-run']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SERVICE_URL=$(gcloud run services describe ${_SERVICE_NAME} \
          --region=${_REGION} \
          --format='value(status.url)' \
          --project=$PROJECT_ID)
        echo "Service URL: $${SERVICE_URL}"
        echo "Checking health endpoint..."
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$${SERVICE_URL}/health" --max-time 15)
        if [ "$${HTTP_CODE}" = "200" ]; then
          echo "✓ Health check passed (HTTP $${HTTP_CODE})"
        else
          echo "✗ Health check returned HTTP $${HTTP_CODE}"
          exit 1
        fi

  # -------------------------------------------------------------------------
  # Step 5: Build the dashboard (Next.js) Docker image
  # -------------------------------------------------------------------------
  - id: 'build-dashboard-image'
    name: 'gcr.io/cloud-builders/docker'
    dir: 'dashboard'
    waitFor: ['-']
    args:
      - 'build'
      - '--build-arg=NEXT_PUBLIC_API_URL=${_DASHBOARD_API_URL}'
      - '--tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_DASHBOARD_SERVICE_NAME}:$COMMIT_SHA'
      - '--tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_DASHBOARD_SERVICE_NAME}:latest'
      - '--cache-from=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_DASHBOARD_SERVICE_NAME}:latest'
      - '--build-arg=BUILDKIT_INLINE_CACHE=1'
      - '.'

  # -------------------------------------------------------------------------
  # Step 6: Push the dashboard image
  # -------------------------------------------------------------------------
  - id: 'push-dashboard-image'
    name: 'gcr.io/cloud-builders/docker'
    waitFor: ['build-dashboard-image']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_DASHBOARD_SERVICE_NAME}'

  # -------------------------------------------------------------------------
  # Step 7: Deploy dashboard to Cloud Run
  # -------------------------------------------------------------------------
  - id: 'deploy-dashboard'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    waitFor: ['push-dashboard-image']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_DASHBOARD_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_DASHBOARD_SERVICE_NAME}:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=${_REGION}'
      - '--allow-unauthenticated'
      - '--set-env-vars=NEXT_PUBLIC_API_URL=${_DASHBOARD_API_URL},NODE_ENV=production'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=60s'
      - '--port=3000'
      - '--project=$PROJECT_ID'

# Store the built images in Artifact Registry
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:latest'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_DASHBOARD_SERVICE_NAME}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_DASHBOARD_SERVICE_NAME}:latest'

timeout: '1800s'
